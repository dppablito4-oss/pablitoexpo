<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PablitoExpo — Proyector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/black.css" id="theme">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="projector">

  <div class="reveal">
    <div class="slides">
      <section>
        <h2>Bienvenidos</h2>
        <p>Presentación interactiva para clase (Supabase Broadcast)</p>
      </section>

      <section>
        <h3>Diapositiva de prueba</h3>
        <p>Controla el puntero láser desde tu móvil.</p>
      </section>

      <section>
        <h3>Física</h3>
        <p>Fórmula de ejemplo:</p>
        <p class="math">$$E = mc^2$$</p>
      </section>
    </div>
  </div>

  <!-- Láser virtual -->
  <div id="laser" class="laser" aria-hidden="true"></div>

  <!-- Dependencias -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

  <!-- Lógica principal (module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
