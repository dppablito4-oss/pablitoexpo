<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PablitoExpo — Control</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Trackpad: subtle grid + scanning sweep */
    #trackpad{
      position:relative; overflow:hidden;
      background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 40px),
                        repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 40px);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 8px 30px rgba(0,0,0,0.5);
    }
    #trackpad::after{
      content:''; position:absolute; left:-30%; top:0; width:60%; height:100%;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(0,240,255,0.06) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-15deg);
      animation: scan 3.5s linear infinite;
      pointer-events:none;
    }
    @keyframes scan{ 0%{left:-60%} 100%{left:120%} }

    /* Buttons: Next larger */
    .buttons{ display:flex; gap:18px; justify-content:center; align-items:center }
    .btn-large{ padding:16px 26px; font-size:1.1rem; background:linear-gradient(135deg,#002233,#001a2a); color:var(--neon); border-radius:12px; border:1px solid rgba(255,255,255,0.06); }
    .btn-small{ padding:10px 14px; font-size:0.95rem }
  </style>
</head>
<body data-page="control">
  <div class="control-root">
    <header>
      <h2>Control Remoto</h2>
      <p>1 dedo: mover láser · 2 dedos: navegar (swipe vertical)</p>
    </header>

    <main>
      <div id="trackpad" class="trackpad">Toca y arrastra aquí</div>
      <div class="buttons">
        <button id="prev" class="btn btn-small">Previous</button>
        <button id="next" class="btn btn-large">Next</button>
      </div>
    </main>

    <footer>
      <small>Reemplaza `SUPABASE_URL` y `SUPABASE_ANON_KEY` en <strong>app.js</strong>.</small>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
